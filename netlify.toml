[build]
  command = "bundle install && bundle exec jekyll build"
  publish = "_site"

[build.environment]
  JEKYLL_ENV = "production"
  # Netlify's build tooling (plugins, post-processing) runs on Node.
  # Node 18 is EOL as of April 2025; pin to 22 to stay on a supported runtime.
  NODE_VERSION = "22"
