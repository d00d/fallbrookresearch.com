<!-- Google Analytics 4 (gtag.js). Fires only in production builds. -->
{% if site.google-analytics and jekyll.environment == "production" %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google-analytics.id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.google-analytics.id }}');
</script>
{% endif %}
